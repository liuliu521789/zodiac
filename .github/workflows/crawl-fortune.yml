name: 爬取生肖运势数据

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点执行（北京时间8点）
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 授予写权限

jobs:
  crawl-fortune:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 确保获取完整的git历史

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行爬取脚本
        run: python crawl_fortune.py

      - name: 检查是否有更改
        id: check_changes
        run: |
          if git diff --name-only | grep -q fortune_data.json; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add fortune_data.json
          git commit -m "更新生肖运势数据 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}